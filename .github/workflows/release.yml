name: Cargo Build & Test

on:
  push:
    tags:
      - 'v*.*.*'  # trigger only on version tags

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Rust (${{ matrix.toolchain }}, ${{ matrix.BUILD_TARGET }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta, nightly]
        BUILD_TARGET: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          profile: minimal
          override: true

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/${{ matrix.toolchain }}
          key: ${{ runner.os }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.toolchain }}-

      - name: Build project
        run: |
          if [ "${{ matrix.BUILD_TARGET }}" == "release" ]; then
            cargo build --release --verbose
          else
            cargo build --verbose
          fi

      - name: Upload artifact for workflow
        uses: actions/upload-artifact@v4
        with:
          name: hn-app-${{ matrix.toolchain }}-${{ matrix.BUILD_TARGET }}
          path: target/${{ matrix.BUILD_TARGET }}/hn-app

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') # only run on tags
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "Creating release $TAG"
          gh release create "$TAG" ./artifacts/* --generate-notes || echo "Release already exists, skipping"
